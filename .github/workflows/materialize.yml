name: Materialize project source

on:
  push:
    branches: [main]
    paths:
      - 'bundle.part*'
      - 'scripts/materialize.sh'
      - '.github/workflows/materialize.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: materialize-and-deploy
  cancel-in-progress: false

jobs:
  materialize:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Materialize application
        shell: bash
        run: bash scripts/materialize.sh

      - name: Commit application source
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Build Batman Knowledge Engine
          file_pattern: .

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
