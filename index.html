<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b0e12">
  <title>The Batman Knowledge Engine</title>
  <style>
    :root{color-scheme:dark;font-family:Inter,system-ui,sans-serif;background:#080a0d;color:#edf0eb}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px),radial-gradient(circle at 70% 15%,rgba(210,163,76,.15),transparent 30%),#080a0d;background-size:38px 38px,38px 38px,auto,auto}.terminal{width:min(760px,100%);padding:clamp(24px,5vw,56px);border:1px solid #303a46;background:#0d1116;box-shadow:0 24px 70px rgba(0,0,0,.45)}.mark{width:92px;color:#d2a34c;margin-bottom:28px}.eyebrow{color:#d2a34c;font-size:12px;font-weight:800;letter-spacing:.2em}.terminal h1{margin:.5rem 0;font-size:clamp(2.2rem,8vw,5.2rem);line-height:.9;letter-spacing:-.055em}.terminal p{color:#9ca6ad;line-height:1.7;max-width:630px}.meter{height:8px;margin:30px 0 12px;background:#202832;overflow:hidden}.meter span{display:block;width:0;height:100%;background:linear-gradient(90deg,#83652d,#f0bf61);transition:width .25s ease}.status{display:flex;justify-content:space-between;gap:16px;color:#9ca6ad;font-size:13px}.error{margin-top:20px;padding:14px;border-left:3px solid #c95b58;background:#171d25;color:#ffd8d6;display:none}.retry{margin-top:16px;padding:11px 16px;border:1px solid #d2a34c;background:#d2a34c;color:#11100d;font-weight:900;cursor:pointer;display:none}@media(max-width:520px){.terminal{padding:24px}.status{display:grid}.terminal h1{font-size:3rem}}
  </style>
</head>
<body>
  <main class="terminal" aria-live="polite">
    <svg class="mark" viewBox="0 0 128 64" aria-hidden="true"><path d="M5 12l28 11L46 5l18 20L82 5l13 18 28-11-16 38-27-7-16 16-16-16-27 7z" fill="currentColor"/></svg>
    <div class="eyebrow">FORENSIC ARCHIVE INITIALIZATION</div>
    <h1>BATMAN<br>KNOWLEDGE ENGINE</h1>
    <p>The local diagnostic system is reconstructing its assessment engine, study archive, adaptive scoring model, and 150-question evidence bank.</p>
    <div class="meter" role="progressbar" aria-label="Application installation progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><span id="fill"></span></div>
    <div class="status"><strong id="message">Registering secure archive…</strong><span id="percent">0%</span></div>
    <div class="error" id="error"></div>
    <button class="retry" id="retry" type="button">Retry initialization</button>
    <noscript><div class="error" style="display:block">JavaScript is required to run the assessment engine.</div></noscript>
  </main>
  <script>
    const fill=document.querySelector('#fill');
    const message=document.querySelector('#message');
    const percent=document.querySelector('#percent');
    const errorBox=document.querySelector('#error');
    const retry=document.querySelector('#retry');
    const meter=document.querySelector('[role="progressbar"]');

    function progress(text,value){
      const amount=Math.max(0,Math.min(100,Number(value)||0));
      message.textContent=text;
      percent.textContent=`${Math.round(amount)}%`;
      fill.style.width=`${amount}%`;
      meter.setAttribute('aria-valuenow',Math.round(amount));
    }

    async function initialize(){
      errorBox.style.display='none';
      retry.style.display='none';
      if(!('serviceWorker' in navigator)) return fail('This browser cannot install the offline assessment archive. Use a current Chrome, Edge, Firefox, or Safari release.');
      try{
        progress('Registering secure archive…',2);
        const registration=await navigator.serviceWorker.register('./bootstrap-sw.js',{scope:'./'});
        await navigator.serviceWorker.ready;
        navigator.serviceWorker.addEventListener('message',event=>{
          const data=event.data||{};
          if(data.type==='PROGRESS') progress(data.message,data.progress);
          if(data.type==='ERROR') fail(data.message);
          if(data.type==='READY'){
            progress('Opening the Batcomputer…',100);
            setTimeout(()=>location.replace('./?engine=ready'),350);
          }
        });
        const worker=navigator.serviceWorker.controller||registration.active||registration.waiting;
        if(!worker){
          navigator.serviceWorker.addEventListener('controllerchange',()=>location.reload(),{once:true});
          return;
        }
        worker.postMessage({type:'MATERIALIZE'});
      }catch(error){fail(error.message||String(error));}
    }

    function fail(text){
      message.textContent='Initialization interrupted';
      errorBox.textContent=text;
      errorBox.style.display='block';
      retry.style.display='inline-flex';
    }
    retry.addEventListener('click',initialize);
    initialize();
  </script>
</body>
</html>
