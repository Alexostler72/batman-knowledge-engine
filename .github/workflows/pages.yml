name: Deploy Batman Knowledge Engine

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Reconstruct application source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          cat bundle.part* | base64 --decode > project.tar.gz
          gzip -t project.tar.gz
          tar -xzf project.tar.gz --strip-components=1 -C _site
          test -f _site/index.html
          test -f _site/js/app.js
          test -f _site/data/categories.json
          rm -f project.tar.gz
          echo "Application files reconstructed successfully:"
          find _site -type f | sort

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload reconstructed site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
